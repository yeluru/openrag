  <text x="97" y="92" fill="#58a6ff" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">💬 Phase 2 — Answer Questions</text>
  <rect x="565" y="93" width="210" height="54" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="120" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📄 Your Documents</text>
  <rect x="565" y="213" width="210" height="54" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="240" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✂️ Chunk + Structure</text>
  <rect x="565" y="338" width="210" height="54" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="365" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🧠 Embedding Model</text>
  <rect x="105" y="93" width="210" height="54" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="120" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">❓ User Question</text>
  <rect x="105" y="213" width="210" height="54" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="240" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🧠 Embed Question</text>
  <rect x="105" y="338" width="210" height="54" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="365" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🔍 Similarity Search</text>
  <rect x="300" y="478" width="280" height="58" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <ellipse cx="440" cy="478" rx="140" ry="14" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5"/>
  <ellipse cx="440" cy="529" rx="140" ry="9" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.2" opacity="0.8"/>
  <text x="440" y="507" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🗄️ PostgreSQL + pgvector</text>
  <rect x="105" y="623" width="210" height="54" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="650" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📋 Top Passages + Prompt</text>
  <rect x="105" y="748" width="210" height="54" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="775" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🤖 LLM</text>
  <rect x="105" y="873" width="210" height="54" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="900" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✅ Answer + Citations</text>
  <line x1="670" y1="147" x2="670" y2="213" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="670" y1="267" x2="670" y2="338" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <path d="M 670 392 C 670 440 530 440 580 500" fill="none" stroke="#6e7681" stroke-width="2" marker-end="url(#arr-dim)"/>
  <line x1="210" y1="147" x2="210" y2="213" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="267" x2="210" y2="338" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 210 392 C 210 440 350 440 300 500" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 340 536 C 260 590 210 590 210 623" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="677" x2="210" y2="748" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="802" x2="210" y2="873" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="670" y="420" text-anchor="middle" fill="#f0883e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">stores vectors</text>
  <text x="210" y="420" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">queries by similarity</text>
</svg>