  <text x="512" y="140" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📋 Parser Registry</text>
  <line x1="572" y1="140" x2="588" y2="140" stroke="#f0883e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="588" y="104" width="120" height="72" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="648" y="140" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✂️ Structure + Chunk</text>
  <line x1="708" y1="140" x2="724" y2="140" stroke="#f0883e" stroke-width="2" marker-end="url(#arr)"/>
