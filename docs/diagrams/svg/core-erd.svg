<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="g-blue"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/><stop offset="100%" stop-color="#0d419d"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#db6d28"/><stop offset="100%" stop-color="#7d2f00"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8957e5"/><stop offset="100%" stop-color="#4e2c9e"/>
    </linearGradient>
    <linearGradient id="g-green"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea043"/><stop offset="100%" stop-color="#0f4423"/>
    </linearGradient>
    <linearGradient id="g-gray"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d444d"/><stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="g-teal"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b7a6d"/><stop offset="100%" stop-color="#0a4541"/>
    </linearGradient>
    <linearGradient id="g-amber"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98e00"/><stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="g-cyan"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#0a4d60"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#010409" flood-opacity="0.75"/>
    </filter>
    <marker id="arr"        markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-dim"    markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6e7681"/>
    </marker>
    <marker id="arr-green"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#bc8cff"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="1000" height="560" fill="url(#bg-g)"/>
  <rect width="1000" height="560" fill="url(#grid)" opacity="0.45"/>
  <text x="500" y="44" text-anchor="middle" fill="#e6edf3" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800">🗃️ Core Entity-Relationship Diagram</text>
  <rect x="410" y="59" width="180" height="62" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="90" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">👤 users</text>
  <rect x="410" y="239" width="180" height="62" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="270" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📄 documents</text>
  <rect x="40" y="419" width="180" height="62" rx="12" fill="url(#g-teal)" stroke="#39d353" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="450" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🗂️ document_sections</text>
  <rect x="290" y="419" width="180" height="62" rx="12" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="450" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🧩 chunks</text>
  <rect x="530" y="419" width="180" height="62" rx="12" fill="url(#g-amber)" stroke="#e3b341" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="450" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">⚙️ ingestion_jobs</text>
  <rect x="780" y="239" width="180" height="62" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="870" y="270" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">💬 chat_sessions</text>
