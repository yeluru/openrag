  <rect width="520" height="960" fill="url(#bg-g)"/>
  <rect width="520" height="960" fill="url(#grid)" opacity="0.45"/>
  <text x="260" y="46" text-anchor="middle" fill="#e6edf3" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800">🔍 RAG Query Path</text>
  <text x="260" y="66" text-anchor="middle" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">How a question becomes a grounded answer</text>
  <rect x="90" y="81" width="340" height="58" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="110" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🌐 POST /chat/ask + scope</text>
  <text x="260" y="153" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">API endpoint receives query</text>
  <circle cx="70" cy="110" r="12" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
