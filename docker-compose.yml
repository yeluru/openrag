# Local PostgreSQL with pgvector for OpenRAG
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: openrag
      POSTGRES_PASSWORD: openrag
      POSTGRES_DB: openrag
    ports:
      - "5433:5432"
    volumes:
      - openrag_pg:/var/lib/postgresql/data

volumes:
  openrag_pg:
