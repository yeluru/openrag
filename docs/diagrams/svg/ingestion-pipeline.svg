  <text x="920" y="140" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🗄️ Write Chunk Vectors</text>
  <line x1="980" y1="140" x2="996" y2="140" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="996" y="104" width="120" height="72" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1056" y="140" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✅ Job: ready</text>
