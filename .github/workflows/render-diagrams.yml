# Regenerate README diagram PNGs from Mermaid sources when diagram inputs change on main.
name: Render Mermaid diagrams

on:
  push:
    branches: [main]
    paths:
      - "docs/diagrams/sources/**"
      - "docs/diagrams/mermaid-config.json"
      - "scripts/render_diagrams.sh"
      - ".github/workflows/render-diagrams.yml"
  workflow_dispatch: {}

concurrency:
  group: render-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    # ubuntu-22.04: stable lib names for Puppeteer’s bundled Chromium (ubuntu-latest/24.04 uses *t64 renames).
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Puppeteer/Chromium needs these on Ubuntu (mmdc otherwise exits non-zero).
      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-6 \
            libxcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            wget \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render PNGs
        run: bash scripts/render_diagrams.sh

      - name: Commit and push if PNGs changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/png/
          if git diff --staged --quiet; then
            echo "Diagram PNGs unchanged."
          else
            git commit -m "chore(docs): regenerate Mermaid diagram PNGs"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
