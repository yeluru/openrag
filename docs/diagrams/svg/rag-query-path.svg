  <line x1="260" y1="161" x2="260" y2="196" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="90" y="196" width="340" height="58" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="225" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🧠 Embed the Question</text>
  <text x="260" y="268" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">Convert text → vector</text>
  <circle cx="70" cy="225" r="12" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="70" y="225" text-anchor="middle" dominant-baseline="middle" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">2</text>
  <line x1="260" y1="276" x2="260" y2="311" stroke="#8b949e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="90" y="311" width="340" height="58" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="340" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📐 pgvector cosine top-K</text>
  <text x="260" y="383" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">ANN similarity search</text>
  <circle cx="70" cy="340" r="12" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="70" y="340" text-anchor="middle" dominant-baseline="middle" fill="#f0883e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">3</text>
  <line x1="260" y1="391" x2="260" y2="431" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="90" y="440" width="340" height="54" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <ellipse cx="260" cy="440" rx="170" ry="14" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5"/>
  <ellipse cx="260" cy="487" rx="170" ry="9" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.2" opacity="0.8"/>
  <text x="260" y="467" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🗄️ PostgreSQL + pgvector</text>
  <text x="260" y="503" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">Fetch top matching chunks</text>
  <circle cx="70" cy="460" r="12" fill="#0d1117" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="70" y="460" text-anchor="middle" dominant-baseline="middle" fill="#bc8cff" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">4</text>
  <line x1="260" y1="511" x2="260" y2="546" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="90" y="546" width="340" height="58" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="575" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✂️ Dedupe + Min-Score Filter</text>
  <text x="260" y="618" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">Remove noise &amp; duplicates</text>
  <circle cx="70" cy="575" r="12" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="70" y="575" text-anchor="middle" dominant-baseline="middle" fill="#f0883e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">5</text>
  <line x1="260" y1="626" x2="260" y2="661" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="90" y="661" width="340" height="58" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="690" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📋 Build Grounded Prompt</text>
  <text x="260" y="733" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">Inject context into prompt</text>
  <circle cx="70" cy="690" r="12" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="70" y="690" text-anchor="middle" dominant-baseline="middle" fill="#f0883e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">6</text>
  <line x1="260" y1="741" x2="260" y2="781" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="90" y="781" width="340" height="58" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="810" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🤖 Chat Completion API</text>
  <text x="260" y="853" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">LLM generates answer</text>
  <circle cx="70" cy="810" r="12" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="70" y="810" text-anchor="middle" dominant-baseline="middle" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">7</text>
  <line x1="260" y1="861" x2="260" y2="896" stroke="#8b949e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="90" y="896" width="340" height="58" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="925" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">✅ Answer + Source Citations</text>
  <text x="260" y="968" text-anchor="middle" fill="#6e7681" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">Streamed back to caller</text>
  <circle cx="70" cy="925" r="12" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="70" y="925" text-anchor="middle" dominant-baseline="middle" fill="#3fb950" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">8</text>
</svg>