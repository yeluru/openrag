<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 790" width="920" height="790">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="g-blue"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/><stop offset="100%" stop-color="#0d419d"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#db6d28"/><stop offset="100%" stop-color="#7d2f00"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8957e5"/><stop offset="100%" stop-color="#4e2c9e"/>
    </linearGradient>
    <linearGradient id="g-green"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea043"/><stop offset="100%" stop-color="#0f4423"/>
    </linearGradient>
    <linearGradient id="g-gray"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d444d"/><stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="g-teal"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b7a6d"/><stop offset="100%" stop-color="#0a4541"/>
    </linearGradient>
    <linearGradient id="g-amber"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98e00"/><stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="g-cyan"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#0a4d60"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#010409" flood-opacity="0.75"/>
    </filter>
    <marker id="arr"        markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-dim"    markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6e7681"/>
    </marker>
    <marker id="arr-green"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#bc8cff"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="920" height="790" fill="url(#bg-g)"/>
  <rect width="920" height="790" fill="url(#grid)" opacity="0.45"/>
  <text x="460" y="38" text-anchor="middle" fill="#e6edf3" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800">🏗️ System Architecture</text>
  <text x="460" y="60" text-anchor="middle" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">FastAPI · PostgreSQL · pgvector · OpenAI-compatible APIs</text>
  <rect x="30" y="635" width="860" height="100" rx="14" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" opacity="0.9"/>
  <text x="52" y="685" dominant-baseline="middle" fill="#bc8cff" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🗄️ Data Tier</text>
  <rect x="250" y="657" width="260" height="56" rx="12" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="685" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🐘 PostgreSQL + pgvector</text>
  <rect x="530" y="657" width="260" height="56" rx="12" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="685" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📁 Upload Dir on Disk</text>
  <rect x="30" y="505" width="860" height="100" rx="14" fill="#161b22" stroke="#8b949e" stroke-width="1.5" opacity="0.9"/>
  <text x="52" y="555" dominant-baseline="middle" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🌐 External Services</text>
  <rect x="390" y="527" width="260" height="56" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="546" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🤖 OpenAI-Compatible</text>
  <text x="520" y="566" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Embedding + Chat APIs</text>
  <rect x="30" y="375" width="860" height="100" rx="14" fill="#161b22" stroke="#f0883e" stroke-width="1.5" opacity="0.9"/>
  <text x="52" y="425" dominant-baseline="middle" fill="#f0883e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🧩 Domain Layer</text>
  <rect x="250" y="397" width="260" height="56" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="425" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🔍 pgvector Retrieval</text>
  <rect x="530" y="397" width="260" height="56" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="425" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📝 Grounded Prompts</text>
  <rect x="30" y="245" width="860" height="100" rx="14" fill="#161b22" stroke="#3fb950" stroke-width="1.5" opacity="0.9"/>
  <text x="52" y="295" dominant-baseline="middle" fill="#3fb950" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">⚙️ Application Tier</text>
  <rect x="180" y="267" width="213" height="56" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="286" y="295" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🚀 FastAPI /api/v1</text>
  <rect x="413" y="267" width="213" height="56" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="519" y="295" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🔄 Ingestion Worker</text>
  <rect x="646" y="267" width="213" height="56" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="752" y="295" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📦 Parsers PDF·DOCX·XLSX</text>
  <rect x="30" y="105" width="860" height="100" rx="14" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" opacity="0.9"/>
  <text x="52" y="155" dominant-baseline="middle" fill="#58a6ff" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🖥️ Client Tier</text>
  <rect x="250" y="127" width="260" height="56" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="380" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">⚛️ React UI (optional)</text>
  <rect x="530" y="127" width="260" height="56" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🔌 Your App / curl / SDK / n8n</text>
  <line x1="460" y1="607" x2="460" y2="633" stroke="#8b949e" stroke-width="2" marker-end="url(#arr-dim)"/>
  <line x1="460" y1="477" x2="460" y2="503" stroke="#8b949e" stroke-width="2" marker-end="url(#arr-dim)"/>
  <line x1="460" y1="347" x2="460" y2="373" stroke="#8b949e" stroke-width="2" marker-end="url(#arr-dim)"/>
  <line x1="460" y1="207" x2="460" y2="243" stroke="#8b949e" stroke-width="2" marker-end="url(#arr-dim)"/>
</svg>