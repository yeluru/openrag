<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" width="980" height="460">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="g-blue"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/><stop offset="100%" stop-color="#0d419d"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#db6d28"/><stop offset="100%" stop-color="#7d2f00"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8957e5"/><stop offset="100%" stop-color="#4e2c9e"/>
    </linearGradient>
    <linearGradient id="g-green"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea043"/><stop offset="100%" stop-color="#0f4423"/>
    </linearGradient>
    <linearGradient id="g-gray"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d444d"/><stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="g-teal"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b7a6d"/><stop offset="100%" stop-color="#0a4541"/>
    </linearGradient>
    <linearGradient id="g-amber"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98e00"/><stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="g-cyan"   x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#0a4d60"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#010409" flood-opacity="0.75"/>
    </filter>
    <marker id="arr"        markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#f0883e"/>
    </marker>
    <marker id="arr-dim"    markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6e7681"/>
    </marker>
    <marker id="arr-green"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#bc8cff"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="980" height="460" fill="url(#bg-g)"/>
  <rect width="980" height="460" fill="url(#grid)" opacity="0.45"/>
  <text x="490" y="42" text-anchor="middle" fill="#e6edf3" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800">🛣️ API Routes</text>
  <text x="490" y="64" text-anchor="middle" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">All mounted under  API_PREFIX  (e.g. /api/v1)</text>
  <rect x="52" y="130" width="200" height="68" rx="12" fill="url(#g-teal)" stroke="#39d353" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="152" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">👤 /users</text>
  <text x="152" y="175" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Bootstrap user identity</text>
  <rect x="277" y="130" width="200" height="68" rx="12" fill="url(#g-blue)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="377" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📄 /documents</text>
  <text x="377" y="175" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Upload · Status · PDF endpoints</text>
  <rect x="502" y="130" width="200" height="68" rx="12" fill="url(#g-green)" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="602" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">💬 /chat</text>
  <text x="602" y="175" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Ask questions with RAG</text>
  <rect x="727" y="130" width="200" height="68" rx="12" fill="url(#g-orange)" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="827" y="155" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🔎 /search</text>
  <text x="827" y="175" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Semantic full-text search</text>
  <rect x="52" y="290" width="200" height="68" rx="12" fill="url(#g-amber)" stroke="#e3b341" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="152" y="315" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📝 /quizzes</text>
  <text x="152" y="335" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">AI quizzes + flashcards</text>
  <rect x="277" y="290" width="200" height="68" rx="12" fill="url(#g-purple)" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="377" y="315" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">📌 /notes</text>
  <text x="377" y="335" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Highlights · notes · activity</text>
  <rect x="502" y="290" width="200" height="68" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="602" y="315" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">❤️ /health</text>
  <text x="602" y="335" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">DB connectivity check</text>
  <rect x="727" y="290" width="200" height="68" rx="12" fill="url(#g-gray)" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="827" y="315" text-anchor="middle" dominant-baseline="middle" fill="#e6edf3" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700">🏓 /healthz</text>
  <text x="827" y="335" text-anchor="middle" dominant-baseline="middle" fill="#c9d1d9" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500">Liveness probe (no DB)</text>
</svg>